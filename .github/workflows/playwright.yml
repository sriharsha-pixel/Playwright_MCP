name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Filter tests by tags (e.g., @smoke @regression). Leave empty to run all tests.'
        required: false
        type: string
      headed:
        description: 'Run tests in headed mode (visible browser)'
        required: false
        default: false
        type: boolean
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test ${{ inputs.headed == 'true' && '--headed' || '' }} ${{ inputs.tags && format('--grep "{0}"', inputs.tags) || '' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
